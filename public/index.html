<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Загрузка Квиза</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-indigo-600 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full text-center">
        <h1 class="text-2xl font-bold text-slate-800 mb-6">Настройка игры</h1>
        
        <div class="border-2 border-dashed border-slate-200 rounded-2xl p-6 mb-6">
            <input type="file" id="jsonInput" accept=".json" class="hidden">
            <label for="jsonInput" class="cursor-pointer text-indigo-600 font-semibold hover:text-indigo-800">
                📁 Нажмите, чтобы выбрать JSON
            </label>
            <p id="fileName" class="text-xs text-slate-400 mt-2">Файл не выбран</p>
        </div>

        <button onclick="uploadJSON()" class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-bold hover:bg-emerald-600 transition-all shadow-lg shadow-emerald-200">
            Запустить игру
        </button>
    </div>

    <script>
        // Показываем имя выбранного файла
        document.getElementById('jsonInput').onchange = function() {
            document.getElementById('fileName').innerText = this.files[0].name;
        };

        async function uploadJSON() {
            const fileInput = document.getElementById('jsonInput');
            if (!fileInput.files[0]) return alert('Сначала выберите файл!');

            const formData = new FormData();
            formData.append('jsonFile', fileInput.files[0]);

            const res = await fetch('/upload-json', { method: 'POST', body: formData });
            const data = await res.json();
            
            if (data.status === 'success') {
                window.location.href = 'play.html';
            } else {
                alert('Ошибка загрузки');
            }
        }
    </script>
</body>
</html>
